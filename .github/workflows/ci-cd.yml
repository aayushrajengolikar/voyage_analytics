name: Voyage Analytics CI/CD

on:
  push:
    branches:
      - master

jobs:

  backend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.workspace }}/requirements.txt

    - name: Create MLflow safe environment
      run: |
        mkdir -p mlruns

    - name: Run backend import safely (MLflow bypass)
      working-directory: app
      run: |
        PYTHONPATH=.. python -c "
import os
os.environ['CI'] = 'true'

import mlflow.pyfunc

# Monkey patch MLflow to prevent artifact loading in CI
def fake_load_model(*args, **kwargs):
    print('MLflow load_model skipped in CI')
    return None

mlflow.pyfunc.load_model = fake_load_model

import main
"

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install frontend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install streamlit

    - name: Test Streamlit app import
      working-directory: frontend
      run: |
        python -c "import streamlit_app"