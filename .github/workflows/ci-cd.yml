name: Voyage Analytics CI/CD

on:
  push:
    branches:
      - master

jobs:

  backend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.workspace }}/requirements.txt

    - name: Create MLflow safe folder (not strictly required now)
      run: |
        mkdir -p mlruns

    - name: Run backend safely (MLflow fully bypassed)
      working-directory: app
      run: |
        PYTHONPATH=.. python -c "
import sys
import types

# -----------------------------
# MOCK MLflow BEFORE importing app
# -----------------------------
fake_mlflow = types.ModuleType('mlflow')
fake_pyfunc = types.ModuleType('mlflow.pyfunc')

def fake_load_model(*args, **kwargs):
    print('MLflow load_model skipped in CI')
    return None

fake_pyfunc.load_model = fake_load_model
fake_mlflow.pyfunc = fake_pyfunc

sys.modules['mlflow'] = fake_mlflow
sys.modules['mlflow.pyfunc'] = fake_pyfunc

# -----------------------------
# Now safely import your app
# -----------------------------
import main
print('Backend import successful')
"

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install frontend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install streamlit

    - name: Test Streamlit app import
      working-directory: frontend
      run: |
        python -c "import streamlit_app; print('Frontend import successful')"