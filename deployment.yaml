apiVersion: apps/v1
kind: Deployment

metadata:
  name: voyage-api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: voyage-api

  template:
    metadata:
      labels:
        app: voyage-api

    spec:
      containers:
      - name: voyage-api
        image: aayushrajengolikar/voyage-api:latest

        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service

metadata:
  name: voyage-api-service

spec:
  type: NodePort

  selector:
    app: voyage-api

  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007